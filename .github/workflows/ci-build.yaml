# Workflow pour construire et pousser une image Docker
name: CI Docker Build

# Déclencheurs du workflow
on:
  push:
    branches:
      - main

# Définition des tâches
jobs:
  # Tâche de construction de l'image Docker
  build:
    # Utiliser la dernière version d'Ubuntu
    runs-on: ubuntu-latest

    # Étapes à exécuter
    steps:
      # Récupérer le code du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # Se connecter à Docker Hub avec les identifiants secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Construire l'image Docker
      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-static-website:latest .

      # Pousser l'image vers Docker Hub
      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-static-website:latest

name: CI Docker Build & Push

on:
  push:
    branches:
      - lab-trivy

jobs:
  docker:
    runs-on: ubuntu-latest

    #environment: dev

    env:
      IMAGE_NAME: ci-html-demo
      IMAGE_TAG: latest
      DOCKER_REGISTRY: moisawade

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      
      - name: Test Varibales
        run: |
          echo "Varibale MYVAR  ${{ vars.MYVAR }} "
          echo "Varibale IMAGE_NAME $IMAGE_NAME"
          echo "Varibale DOCKER_REGISTRY  $DOCKER_REGISTRY "


      - name: Connexion à Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build de l’image Docker
        run: |
          docker build -t $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .
        
      - name: Test de l’image Docker
        run: |
          docker image ls $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG 

      - name: Push de l’image Docker
        run: |
          docker push $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: moisawade/ci-html-demo:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          vuln-type: os,library
          ignore-unfixed: true
          
